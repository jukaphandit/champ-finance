<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champ's Financial Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1 id="userName">—</h1>
      <div style="font-size: 12px; color: var(--text-mute); margin-top: 4px;">Personal Financial Dashboard · จัดการการเงินส่วนตัว</div>
    </div>
    <div class="meta">
      <div>UPDATED <span id="updatedDate">—</span></div>
      <div style="margin-top: 4px; font-weight: 600; color: var(--text);">AGE <span id="userAge">—</span></div>
      <div class="lang-switch" aria-label="Language switcher">
        <button class="lang-btn active" id="langTh" type="button" onclick="setLanguage('th')">TH</button>
        <button class="lang-btn" id="langJa" type="button" onclick="setLanguage('ja')">日本語</button>
      </div>
    </div>
  </div>
  
  <!-- TABS NAV -->
  <!-- ➕ เพิ่ม Tab ใหม่: copy บรรทัดด้านล่าง แล้วเปลี่ยน tabId + ชื่อ -->
  <div class="tabs" id="tabNav">
    <button class="tab active" data-tab="overview"><span class="tab-icon">📊</span>ภาพรวม</button>
    <button class="tab" data-tab="cashflow"><span class="tab-icon">💸</span>Cash Flow</button>
    <button class="tab" data-tab="balance"><span class="tab-icon">⚖️</span>สินทรัพย์/หนี้สิน</button>
    <button class="tab" data-tab="career"><span class="tab-icon">💼</span>Career & Profile</button>
    <button class="tab" data-tab="salary"><span class="tab-icon">📈</span>เงินเดือน</button>
    <button class="tab" data-tab="insurance"><span class="tab-icon">🛡️</span>ประกัน</button>
    <button class="tab" data-tab="retirement"><span class="tab-icon">🌅</span>เกษียณ</button>
    <button class="tab" data-tab="loan"><span class="tab-icon">🏡</span>หนี้บ้าน</button>
    <button class="tab" data-tab="actions"><span class="tab-icon">✓</span>สิ่งต้องทำ</button>
    <!-- ➕ ADD NEW TAB HERE -->
    <!-- <button class="tab" data-tab="goals"><span class="tab-icon">🎯</span>เป้าหมาย</button> -->
  </div>

  <!-- TAB PANELS — โหลดจาก tabs/*.html อัตโนมัติ -->
  <div id="tabContent">
    <div style="padding: 40px; text-align: center; color: var(--text-mute);">
      ⏳ กำลังโหลด Dashboard...
    </div>
  </div>

</div>

<!-- Scripts: data.js ก่อน, logic.js หลัง -->
<script src="data.js"></script>
<script src="logic.js"></script>

<script>
// ============================================================
// 🗂️ TAB LOADER — fetch() โหลด HTML จาก tabs/
// ============================================================

const TABS = [
  'overview', 'cashflow', 'balance', 'career',
  'salary', 'insurance', 'retirement', 'loan', 'actions'
  // ➕ เพิ่มชื่อ tab ใหม่ที่นี่ เช่น 'goals', 'will'
];

let tabsLoaded = {};
let currentTab = 'overview';

async function loadTab(tabId) {
  if (tabsLoaded[tabId]) return; // already loaded
  try {
    const res = await fetch(`tabs/${tabId}.html`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();
    const panel = document.createElement('div');
    panel.innerHTML = html;
    document.getElementById('tabContent').appendChild(panel.firstElementChild);
    tabsLoaded[tabId] = true;
  } catch (err) {
    console.warn(`⚠️ Could not load tab: ${tabId}`, err.message);
  }
}

async function showTab(tabId) {
  // Load tab if not yet loaded
  await loadTab(tabId);

  // Switch active states
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  const btn = document.querySelector(`[data-tab="${tabId}"]`);
  if (btn) btn.classList.add('active');

  const panel = document.getElementById(tabId);
  if (panel) panel.classList.add('active');

  currentTab = tabId;
  if (typeof setLanguage === 'function') setLanguage(CURRENT_LANG);
}

// Bind tab buttons
document.getElementById('tabNav').addEventListener('click', e => {
  const btn = e.target.closest('[data-tab]');
  if (btn) showTab(btn.dataset.tab);
});

// ============================================================
// 🚀 INIT — โหลด overview ก่อน แล้ว init dashboard
// ============================================================
(async function bootstrap() {
  // โหลดทุก tab ก่อนเลย
  await Promise.all(TABS.map(t => loadTab(t)));
  showTab('overview');

  await new Promise(r => setTimeout(r, 100));

  if (typeof initDashboard === 'function') {
    await initDashboard();
  }
})();
</script>

</body>
</html>
